# Configuration file for example.launch.py with FR3 Duo (dual-arm) setup
# This file defines parameters for launching a dual-arm Franka Robotics system.
#
# The FR3_DUO entry is special and indicates a dual-arm setup that uses
# the fr3_duo.urdf.xacro file which contains both robots in a single URDF.
# This is different from single robot configurations which use separate URDFs.
#
# Note: Ensure all boolean values are quoted ("true" or "false") to avoid YAML parsing issues.
# The franka_robot_state_broadcaster is disabled for duo setups as it's not supported.

FR3_DUO:
  robot_types: "['fr3v2','fr3v2']"  # Types of the robot arms (e.g., fr3) Currently only fr3 is supported.
  arm_prefixes: "['left','right']"  # Prefixes for the arms (used to identify each arm)
  robot_ips: "['172.16.16.11','172.16.16.12']"  # IP addresses of the robots
  load_gripper: "false"  # Enable Franka Gripper ("true" or "false") NOTE: Currently not supported.
  use_fake_hardware: "false"  # Use simulated hardware ("true" or "false")
  fake_sensor_commands: "false"  # Enable fake sensor commands for simulation
  joint_state_rate: 1000  # Publishing rate for joint states (Hz)
  namespace: ""  # Namespace for the robot (empty for no namespace)
  use_rviz: "true"  # Launch RViz if "true"
  check_selfcollision: "false" # Run self_collision_node in the background if "true"
  thread_priority: 50  # Thread priority for the hardware interface