pointcloud_crop_box_params:
  input_topic:
    type: string
    default_value: "/points_raw"
    description: "Topic to subscribe to incoming data"
  output_topic:
    type: string
    default_value: "/points_filtered"
    description: "Topic to publish filtered PointCloud2 data"
  target_frame:
    type: string
    default_value: "base_link"
    description: "Target TF frame to transform pointcloud into"
  crop_boxes_names:
    type: string_array
    default_value: ["robot_box"]
    description: "List of crop boxes to apply"
  crop_boxes:
    __map_crop_boxes_names:
      min_x:
        type: double
        default_value: -1.0
      max_x:
        type: double
        default_value: 1.0
      min_y:
        type: double
        default_value: -1.0
      max_y:
        type: double
        default_value: 1.0
      min_z:
        type: double
        default_value: -1.0
      max_z:
        type: double
        default_value: 1.0
  message_type:
    type: string
    default_value: "pointcloud"
    description: "Type of source data to crop, 'pointcloud' or 'lidarscan'"
    validation:
      one_of<>: [ [ "pointcloud", "laserscan" ] ]
  negative:
    type: bool
    default_value: false
    description: "Whether to keep points outside the box"
  visualize_crop_boxes:
    type: bool
    default_value: true
    description: "Whether to publish a visualization marker for the crop boxes"
