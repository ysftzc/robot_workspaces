<svg width="1200" height="740" viewBox="0 0 1200 740" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Readable ROS2 Node Graph and Topic Flow</title>
  <desc id="desc">Large-text report figure showing the main ROS2 subsystems and communication paths.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#047857"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#B45309"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#BE185D"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#6D28D9"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px "DejaVu Sans", Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 18px "DejaVu Sans", Arial, sans-serif; fill: #64748B; }
      .card-title { font: 700 21px "DejaVu Sans", Arial, sans-serif; }
      .body { font: 600 17px "DejaVu Sans", Arial, sans-serif; fill: #111827; }
      .small { font: 400 15px "DejaVu Sans", Arial, sans-serif; fill: #475569; }
      .edge-label { font: 700 15px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .note { font: 400 13px "DejaVu Sans", Arial, sans-serif; fill: #64748B; }
      .card { rx: 12; stroke-width: 1.8; }
      .edge { fill: none; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .edge-dash { fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 7; }
      .label-bg { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <rect width="1200" height="740" fill="#FFFFFF"/>

  <g transform="translate(0,-70)">

  <!-- Cards -->
  <rect class="card" x="60" y="160" width="240" height="178" fill="#EFF6FF" stroke="#2563EB"/>
  <circle cx="86" cy="190" r="6" fill="#2563EB"/>
  <text class="card-title" x="106" y="197" fill="#1D4ED8">Simulation / Robot</text>
  <text class="body" x="86" y="236">Gazebo Harmonic</text>
  <text class="body" x="86" y="267">ros2_control</text>
  <text class="body" x="86" y="298">robot_state_publisher</text>

  <rect class="card" x="390" y="160" width="250" height="178" fill="#ECFDF5" stroke="#047857"/>
  <circle cx="416" cy="190" r="6" fill="#047857"/>
  <text class="card-title" x="436" y="197" fill="#047857">ROS2 Interface</text>
  <text class="body" x="416" y="236">ros_gz_bridge</text>
  <text class="body" x="416" y="267">/camera, /scan, /imu</text>
  <text class="body" x="416" y="298">/joint_states, /tf</text>
  <text class="small" x="416" y="323">sensor and state topics</text>

  <rect class="card" x="780" y="125" width="300" height="205" fill="#FFFBEB" stroke="#B45309"/>
  <circle cx="806" cy="155" r="6" fill="#D97706"/>
  <text class="card-title" x="826" y="162" fill="#92400E">Navigation</text>
  <text class="body" x="806" y="201">robot_localization EKF</text>
  <text class="body" x="806" y="232">AMCL</text>
  <text class="body" x="806" y="263">Nav2</text>
  <text class="body" x="806" y="294">/navigate_to_pose, /cmd_vel</text>
  <text class="small" x="806" y="318">localization and base motion</text>

  <rect class="card" x="390" y="510" width="350" height="205" fill="#FDF2F8" stroke="#BE185D"/>
  <circle cx="416" cy="540" r="6" fill="#DB2777"/>
  <text class="card-title" x="436" y="547" fill="#BE185D">Perception / Tomato Map</text>
  <text class="body" x="416" y="586">YOLO tomato detector</text>
  <text class="body" x="416" y="617">tomato_depth_mapper</text>
  <text class="body" x="416" y="648">/tomato_map/list</text>

  <rect class="card" x="820" y="470" width="320" height="245" fill="#F5F3FF" stroke="#6D28D9"/>
  <circle cx="846" cy="500" r="6" fill="#7C3AED"/>
  <text class="card-title" x="866" y="507" fill="#6D28D9">Mission / Harvest</text>
  <text class="body" x="846" y="546">mission_manager</text>
  <text class="body" x="846" y="577">collision_scene_manager</text>
  <text class="body" x="846" y="608">MoveIt move_group</text>
  <text class="body" x="846" y="639">greenhouse_pick_place</text>
  <text class="body" x="846" y="670">/tomato_harvest/picked</text>
  <text class="small" x="846" y="699">planning, grasp, and release</text>

  <!-- Main flows -->
  <path class="edge" d="M300,249 L390,249" stroke="#2563EB" marker-end="url(#arrow-blue)"/>
  <rect class="label-bg" x="318" y="219" width="54" height="24"/>
  <text class="edge-label" x="345" y="236" text-anchor="middle">bridge</text>

  <path class="edge" d="M640,220 C700,200 730,192 780,190" stroke="#047857" marker-end="url(#arrow-green)"/>
  <rect class="label-bg" x="668" y="167" width="82" height="24"/>
  <text class="edge-label" x="709" y="184" text-anchor="middle">scan + TF</text>

  <path class="edge" d="M515,338 L515,510" stroke="#BE185D" marker-end="url(#arrow-pink)"/>
  <rect class="label-bg" x="532" y="415" width="120" height="24"/>
  <text class="edge-label" x="592" y="432" text-anchor="middle">RGB-D image</text>

  <path class="edge" d="M930,330 L930,470" stroke="#6D28D9" marker-end="url(#arrow-purple)"/>
  <rect class="label-bg" x="945" y="390" width="93" height="24"/>
  <text class="edge-label" x="992" y="407" text-anchor="middle">mission state</text>

  <path class="edge" d="M740,612 L820,612" stroke="#6D28D9" marker-end="url(#arrow-purple)"/>
  <rect class="label-bg" x="748" y="582" width="83" height="24"/>
  <text class="edge-label" x="790" y="599" text-anchor="middle">3D targets</text>

  <path class="edge-dash" d="M790,675 C720,748 500,775 190,775 C120,775 95,695 95,338" stroke="#475569" marker-end="url(#arrow-slate)"/>
  <rect class="label-bg" x="410" y="744" width="250" height="24"/>
  <text class="edge-label" x="535" y="761" text-anchor="middle">arm/base commands + attach/detach</text>

  <path class="edge-dash" d="M820,688 C760,735 676,722 665,715" stroke="#BE185D" marker-end="url(#arrow-pink)"/>
  <rect class="label-bg" x="690" y="704" width="92" height="24"/>
  <text class="edge-label" x="736" y="721" text-anchor="middle">picked event</text>

  <!-- Legend / note -->
  <rect x="60" y="720" width="278" height="58" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <line x1="82" y1="748" x2="132" y2="748" stroke="#2563EB" stroke-width="2.8" marker-end="url(#arrow-blue)"/>
  <text class="small" x="145" y="753">data / command flow</text>
  <line x1="82" y1="770" x2="132" y2="770" stroke="#475569" stroke-width="2.3" stroke-dasharray="8 7" marker-end="url(#arrow-slate)"/>
  <text class="small" x="145" y="775">feedback / update</text>

  <text class="note" x="1140" y="780" text-anchor="end">Detailed topic and node list is reported separately in Table E2.</text>
  </g>
</svg>
