<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <marker id="arrow-dark" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#263238"/>
    </marker>
    <marker id="arrow-muted" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-15%" y="-18%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="navGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#f7fee7"/>
    </linearGradient>
    <linearGradient id="pickGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <linearGradient id="doneGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; rx: 30; filter: url(#shadow); }
      .title { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 700; font-size: 28px; fill: #111827; }
      .body { font-family: DejaVu Sans, Arial, sans-serif; font-size: 22px; fill: #334155; }
      .small { font-family: DejaVu Sans, Arial, sans-serif; font-size: 18px; fill: #475569; }
      .tiny { font-family: DejaVu Sans, Arial, sans-serif; font-size: 15px; fill: #64748b; }
      .chip { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .chipText { font-family: DejaVu Sans, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #334155; }
      .num { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 800; font-size: 22px; fill: #ffffff; }
      .arrow { fill: none; stroke: #263238; stroke-width: 4; marker-end: url(#arrow-dark); }
      .arrowMuted { fill: none; stroke: #64748b; stroke-width: 3.2; marker-end: url(#arrow-muted); }
      .loop { fill: none; stroke: #ef4444; stroke-width: 3.4; stroke-dasharray: 10 10; marker-end: url(#arrow-muted); }
      .sectionLabel { font-family: DejaVu Sans, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #475569; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>
  <rect x="58" y="54" width="1804" height="972" rx="34" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="96" y="113" class="title" font-size="34">MissionManager State Machine</text>
  <text x="96" y="151" class="body">High-level mission flow from localization to waypoint scanning, target selection, pick-place execution, and recovery.</text>

  <!-- Main pipeline cards -->
  <g transform="translate(96,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="url(#navGrad)" stroke="#38bdf8"/>
    <circle cx="34" cy="34" r="22" fill="#0284c7"/>
    <text x="27" y="42" class="num">1</text>
    <text x="32" y="88" class="title">Localize</text>
    <text x="32" y="128" class="body">Wait for</text>
    <text x="32" y="158" class="body">AMCL pose</text>
    <text x="32" y="190" class="small">robot pose on map</text>
    <rect class="chip" x="32" y="206" width="126" height="34"/>
    <text x="49" y="230" class="chipText">LOCALIZE</text>
  </g>

  <g transform="translate(382,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="#fff7ed" stroke="#fb923c"/>
    <circle cx="34" cy="34" r="22" fill="#ea580c"/>
    <text x="27" y="42" class="num">2</text>
    <text x="32" y="88" class="title">Schedule</text>
    <text x="32" y="128" class="body">Load next</text>
    <text x="32" y="158" class="body">waypoint</text>
    <text x="32" y="190" class="small">state + arm pose</text>
    <rect class="chip" x="32" y="206" width="86" height="34"/>
    <text x="49" y="230" class="chipText">BOOT</text>
  </g>

  <g transform="translate(668,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="#ecfeff" stroke="#22d3ee"/>
    <circle cx="34" cy="34" r="22" fill="#0891b2"/>
    <text x="27" y="42" class="num">3</text>
    <text x="32" y="88" class="title">Navigate</text>
    <text x="32" y="128" class="body">Move to</text>
    <text x="32" y="158" class="body">plant row</text>
    <text x="32" y="190" class="small">Nav2 or yaw turn</text>
    <rect class="chip" x="32" y="206" width="154" height="34"/>
    <text x="49" y="230" class="chipText">SURVEY</text>
  </g>

  <g transform="translate(954,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="url(#scanGrad)" stroke="#22c55e"/>
    <circle cx="34" cy="34" r="22" fill="#16a34a"/>
    <text x="27" y="42" class="num">4</text>
    <text x="32" y="88" class="title">Scan</text>
    <text x="32" y="128" class="body">FR3 scan</text>
    <text x="32" y="158" class="body">poses</text>
    <text x="32" y="190" class="small">YOLO updates map</text>
    <rect class="chip" x="32" y="206" width="154" height="34"/>
    <text x="49" y="230" class="chipText">HARVEST</text>
  </g>

  <g transform="translate(1240,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="#fefce8" stroke="#eab308"/>
    <circle cx="34" cy="34" r="22" fill="#ca8a04"/>
    <text x="27" y="42" class="num">5</text>
    <text x="32" y="88" class="title">Select</text>
    <text x="32" y="128" class="body">Choose</text>
    <text x="32" y="158" class="body">tomato</text>
    <text x="32" y="190" class="small">class + distance</text>
    <rect class="chip" x="32" y="206" width="164" height="34"/>
    <text x="49" y="230" class="chipText">TARGET</text>
  </g>

  <g transform="translate(1526,230)">
    <rect class="panel" x="0" y="0" width="248" height="248" fill="url(#pickGrad)" stroke="#fb7185"/>
    <circle cx="34" cy="34" r="22" fill="#e11d48"/>
    <text x="27" y="42" class="num">6</text>
    <text x="32" y="88" class="title">Pick-place</text>
    <text x="32" y="128" class="body">OMPL +</text>
    <text x="32" y="158" class="body">Pilz LIN</text>
    <text x="32" y="190" class="small">grasp and drop</text>
    <rect class="chip" x="32" y="206" width="118" height="34"/>
    <text x="49" y="230" class="chipText">DONE</text>
  </g>

  <!-- Main arrows -->
  <path class="arrow" d="M344 354 H374"/>
  <path class="arrow" d="M630 354 H660"/>
  <path class="arrow" d="M916 354 H946"/>
  <path class="arrow" d="M1202 354 H1232"/>
  <path class="arrow" d="M1488 354 H1518"/>

  <!-- Bottom detail lanes -->
  <text x="96" y="572" class="sectionLabel">Decision logic used inside the main loop</text>
  <line x1="96" y1="594" x2="1774" y2="594" stroke="#e2e8f0" stroke-width="2"/>

  <g transform="translate(128,642)">
    <rect x="0" y="0" width="392" height="148" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="title" font-size="24">Waypoint validation</text>
    <text x="28" y="82" class="small">Pose error is checked after Nav2.</text>
    <text x="28" y="111" class="small">Retry or direct yaw turn is selected.</text>
  </g>

  <g transform="translate(590,642)">
    <rect x="0" y="0" width="392" height="148" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="title" font-size="24">Harvest trigger</text>
    <text x="28" y="82" class="small">Pick starts at configured</text>
    <text x="28" y="111" class="small">pick-front or scan trigger points.</text>
  </g>

  <g transform="translate(1052,642)">
    <rect x="0" y="0" width="392" height="148" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="title" font-size="24">Target filters</text>
    <text x="28" y="82" class="small">Green/unripe fruit is rejected.</text>
    <text x="28" y="111" class="small">Confidence and distance are checked.</text>
  </g>

  <g transform="translate(1514,642)">
    <rect x="0" y="0" width="260" height="148" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="44" class="title" font-size="24">Recovery</text>
    <text x="28" y="82" class="small">Failed target is skipped</text>
    <text x="28" y="111" class="small">or mission enters FAILED.</text>
  </g>

  <path class="arrowMuted" d="M520 716 H580"/>
  <path class="arrowMuted" d="M982 716 H1042"/>
  <path class="arrowMuted" d="M1444 716 H1504"/>

  <!-- Recovery loop -->
  <path class="loop" d="M1650 640 C1650 570, 1388 552, 1364 486"/>
  <text x="1392" y="548" class="small" fill="#ef4444">try next candidate</text>

  <!-- Terminal states -->
  <g transform="translate(126,865)">
    <rect x="0" y="0" width="220" height="72" rx="22" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="60" y="46" class="title" font-size="24">DONE</text>
  </g>
  <g transform="translate(386,865)">
    <rect x="0" y="0" width="220" height="72" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="52" y="46" class="title" font-size="24">FAILED</text>
  </g>
  <g transform="translate(646,865)">
    <rect x="0" y="0" width="220" height="72" rx="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="42" y="46" class="title" font-size="24">STOPPED</text>
  </g>

  <text x="914" y="894" class="small">Services: /mission_manager/start, /mission_manager/stop, /mission_manager/reset</text>
  <text x="914" y="925" class="tiny">Simplified operational state machine. Low-level action feedback and retry counters are omitted for readability.</text>
</svg>
