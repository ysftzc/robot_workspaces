<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="900" viewBox="0 0 1920 900">
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-red" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#dc2626"/>
    </marker>
    <filter id="softShadow" x="-12%" y="-16%" width="124%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .card { stroke-width: 2.5; rx: 30; filter: url(#softShadow); }
      .num { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 800; font-size: 28px; fill: white; }
      .title { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 800; font-size: 34px; fill: #0f172a; }
      .text { font-family: DejaVu Sans, Arial, sans-serif; font-size: 24px; fill: #334155; }
      .chipText { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #334155; }
      .laneTitle { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 800; font-size: 28px; fill: #991b1b; }
      .laneText { font-family: DejaVu Sans, Arial, sans-serif; font-size: 23px; fill: #7f1d1d; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 5; marker-end: url(#arrow); }
      .recoveryArrow { fill: none; stroke: #dc2626; stroke-width: 4.5; stroke-dasharray: 14 12; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect class="page" width="1920" height="900"/>
  <rect x="70" y="72" width="1780" height="756" rx="42" fill="white" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Main five-stage mission loop -->
  <g transform="translate(100,190)">
    <rect class="card" x="0" y="0" width="285" height="260" fill="#eff6ff" stroke="#3b82f6"/>
    <circle cx="50" cy="52" r="29" fill="#2563eb"/>
    <text x="41" y="62" class="num">1</text>
    <text x="42" y="118" class="title">Localize</text>
    <text x="42" y="164" class="text">AMCL estimates</text>
    <text x="42" y="198" class="text">robot pose on map</text>
    <rect x="42" y="218" width="132" height="34" rx="17" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="62" y="242" class="chipText">LOCALIZE</text>
  </g>

  <path class="arrow" d="M395 320 H442"/>

  <g transform="translate(450,190)">
    <rect class="card" x="0" y="0" width="285" height="260" fill="#ecfeff" stroke="#06b6d4"/>
    <circle cx="50" cy="52" r="29" fill="#0891b2"/>
    <text x="41" y="62" class="num">2</text>
    <text x="42" y="118" class="title">Navigate</text>
    <text x="42" y="164" class="text">Move to plant</text>
    <text x="42" y="198" class="text">waypoint</text>
    <rect x="42" y="218" width="118" height="34" rx="17" fill="#cffafe" stroke="#67e8f9"/>
    <text x="62" y="242" class="chipText">NAV2</text>
  </g>

  <path class="arrow" d="M745 320 H792"/>

  <g transform="translate(800,190)">
    <rect class="card" x="0" y="0" width="285" height="260" fill="#f0fdf4" stroke="#22c55e"/>
    <circle cx="50" cy="52" r="29" fill="#16a34a"/>
    <text x="41" y="62" class="num">3</text>
    <text x="42" y="118" class="title">Scan</text>
    <text x="42" y="164" class="text">FR3 scan poses</text>
    <text x="42" y="198" class="text">update tomato map</text>
    <rect x="42" y="218" width="122" height="34" rx="17" fill="#dcfce7" stroke="#86efac"/>
    <text x="62" y="242" class="chipText">YOLO</text>
  </g>

  <path class="arrow" d="M1095 320 H1142"/>

  <g transform="translate(1150,190)">
    <rect class="card" x="0" y="0" width="285" height="260" fill="#fffbeb" stroke="#f59e0b"/>
    <circle cx="50" cy="52" r="29" fill="#d97706"/>
    <text x="41" y="62" class="num">4</text>
    <text x="42" y="118" class="title">Select</text>
    <text x="42" y="164" class="text">Choose ripe or</text>
    <text x="42" y="198" class="text">rotten target</text>
    <rect x="42" y="218" width="148" height="34" rx="17" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="62" y="242" class="chipText">FILTER</text>
  </g>

  <path class="arrow" d="M1445 320 H1492"/>

  <g transform="translate(1500,190)">
    <rect class="card" x="0" y="0" width="285" height="260" fill="#fff1f2" stroke="#f43f5e"/>
    <circle cx="50" cy="52" r="29" fill="#e11d48"/>
    <text x="41" y="62" class="num">5</text>
    <text x="42" y="118" class="title">Pick-place</text>
    <text x="42" y="164" class="text">MoveIt + Pilz</text>
    <text x="42" y="198" class="text">grasp and drop</text>
    <rect x="42" y="218" width="118" height="34" rx="17" fill="#ffe4e6" stroke="#fda4af"/>
    <text x="62" y="242" class="chipText">DONE</text>
  </g>

  <!-- Recovery lane -->
  <g transform="translate(100,555)">
    <rect x="0" y="0" width="1685" height="118" rx="30" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
    <text x="38" y="48" class="laneTitle">Recovery path</text>
    <text x="38" y="88" class="laneText">If navigation, target selection, or pick fails: retry, skip that target, or stop in FAILED state.</text>
  </g>

  <!-- Terminal arrows -->
  <g transform="translate(100,720)">
    <polygon points="0,0 190,0 230,29 190,58 0,58 28,29" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="78" y="38" class="title" font-size="25">DONE</text>
  </g>
  <g transform="translate(370,720)">
    <polygon points="0,0 190,0 230,29 190,58 0,58 28,29" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="70" y="38" class="title" font-size="25">FAILED</text>
  </g>
  <g transform="translate(640,720)">
    <polygon points="0,0 210,0 250,29 210,58 0,58 28,29" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="58" y="38" class="title" font-size="25">STOPPED</text>
  </g>
</svg>
