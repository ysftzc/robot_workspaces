<svg width="1800" height="1050" viewBox="0 0 1800 1050" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ROS2 Node Graph and Topic Flow</title>
  <desc id="desc">Report-ready ROS2 communication diagram for the greenhouse tomato harvesting system.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#B45309"/>
    </marker>
    <marker id="arrow-rose" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#BE185D"/>
    </marker>
    <marker id="arrow-violet" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#6D28D9"/>
    </marker>
    <marker id="arrow-slate" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 38px "DejaVu Sans", Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 18px "DejaVu Sans", Arial, sans-serif; fill: #64748B; }
      .panel-title { font: 700 15px "DejaVu Sans", Arial, sans-serif; letter-spacing: .9px; }
      .item-title { font: 700 16px "DejaVu Sans", Arial, sans-serif; fill: #111827; }
      .item-sub { font: 400 13px "DejaVu Sans", Arial, sans-serif; fill: #475569; }
      .edge-label { font: 600 14px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .legend-title { font: 700 13px "DejaVu Sans", Arial, sans-serif; letter-spacing: .9px; fill: #475569; }
      .legend-text { font: 400 13px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .small-note { font: 400 13px "DejaVu Sans", Arial, sans-serif; fill: #64748B; }
      .panel { rx: 12; stroke-width: 1.4; }
      .chip { rx: 7; fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1; }
      .edge { fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .edge-thin { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .label-bg { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <rect width="1800" height="1050" fill="#FFFFFF"/>
  <text class="title" x="900" y="54" text-anchor="middle">ROS2 Node Graph / Topic Flow</text>
  <text class="subtitle" x="900" y="84" text-anchor="middle">Main runtime communication paths used by navigation, perception, and tomato harvest modules</text>

  <g transform="translate(0,40)">
  <!-- Simulation / robot panel -->
  <rect class="panel" x="70" y="170" width="280" height="250" fill="#F0F8FF" stroke="#2B6CB0"/>
  <circle cx="95" cy="198" r="5" fill="#2563EB"/>
  <text class="panel-title" x="112" y="203" fill="#1E40AF">SIMULATION / ROBOT</text>
  <rect class="chip" x="92" y="228" width="236" height="48"/>
  <text class="item-title" x="110" y="251">Gazebo Harmonic</text>
  <text class="item-sub" x="110" y="269">/tomato_farm world</text>
  <rect class="chip" x="92" y="288" width="236" height="54"/>
  <text class="item-title" x="110" y="311">ros2_control</text>
  <text class="item-sub" x="110" y="329">drive + FR3 + gripper</text>
  <rect class="chip" x="92" y="354" width="236" height="42"/>
  <text class="item-title" x="110" y="380">robot_state_publisher</text>

  <!-- ROS2 interface panel -->
  <rect class="panel" x="450" y="150" width="300" height="270" fill="#F0FDF9" stroke="#0F766E"/>
  <circle cx="475" cy="178" r="5" fill="#0F766E"/>
  <text class="panel-title" x="492" y="183" fill="#0F766E">ROS2 INTERFACE</text>
  <rect class="chip" x="472" y="208" width="256" height="44"/>
  <text class="item-title" x="490" y="235">ros_gz_bridge</text>
  <rect class="chip" x="472" y="264" width="256" height="66"/>
  <text class="item-title" x="490" y="287">Sensor topics</text>
  <text class="item-sub" x="490" y="306">/camera/*, /scan, /imu, /clock</text>
  <rect class="chip" x="472" y="342" width="256" height="54"/>
  <text class="item-title" x="490" y="365">Joint and TF topics</text>
  <text class="item-sub" x="490" y="383">/joint_states, /tf, /tf_static</text>

  <!-- Navigation panel -->
  <rect class="panel" x="840" y="80" width="330" height="360" fill="#FFFBEB" stroke="#B45309"/>
  <circle cx="865" cy="108" r="5" fill="#D97706"/>
  <text class="panel-title" x="882" y="113" fill="#92400E">NAVIGATION</text>
  <rect class="chip" x="862" y="138" width="286" height="44"/>
  <text class="item-title" x="880" y="165">robot_localization EKF</text>
  <rect class="chip" x="862" y="194" width="286" height="44"/>
  <text class="item-title" x="880" y="221">initial_pose_publisher</text>
  <rect class="chip" x="862" y="250" width="286" height="44"/>
  <text class="item-title" x="880" y="277">AMCL</text>
  <rect class="chip" x="862" y="306" width="286" height="54"/>
  <text class="item-title" x="880" y="329">Nav2</text>
  <text class="item-sub" x="880" y="347">planner + controller</text>
  <rect class="chip" x="862" y="372" width="286" height="44"/>
  <text class="item-title" x="880" y="392">Navigation topics</text>
  <text class="item-sub" x="880" y="410">/amcl_pose, /navigate_to_pose, /cmd_vel</text>

  <!-- Perception panel -->
  <rect class="panel" x="840" y="580" width="330" height="330" fill="#FFF1F7" stroke="#BE185D"/>
  <circle cx="865" cy="608" r="5" fill="#DB2777"/>
  <text class="panel-title" x="882" y="613" fill="#BE185D">PERCEPTION AND TOMATO MAP</text>
  <rect class="chip" x="862" y="638" width="286" height="44"/>
  <text class="item-title" x="880" y="665">yolo_tomato_detector</text>
  <rect class="chip" x="862" y="694" width="286" height="44"/>
  <text class="item-title" x="880" y="714">/yolo/tomato_detections_json</text>
  <text class="item-sub" x="880" y="732">bbox labels and confidence</text>
  <rect class="chip" x="862" y="750" width="286" height="44"/>
  <text class="item-title" x="880" y="777">tomato_depth_mapper</text>
  <rect class="chip" x="862" y="806" width="286" height="44"/>
  <text class="item-title" x="880" y="833">/tomato_map/list</text>
  <rect class="chip" x="862" y="862" width="286" height="30"/>
  <text class="item-title" x="880" y="883">bbox viewer + map panel</text>

  <!-- Harvest panel -->
  <rect class="panel" x="1280" y="120" width="430" height="760" fill="#F5F3FF" stroke="#6D28D9"/>
  <circle cx="1305" cy="148" r="5" fill="#7C3AED"/>
  <text class="panel-title" x="1322" y="153" fill="#6D28D9">MISSION, PLANNING AND HARVEST</text>
  <rect class="chip" x="1302" y="178" width="386" height="44"/>
  <text class="item-title" x="1320" y="205">mission_manager</text>
  <rect class="chip" x="1302" y="234" width="386" height="44"/>
  <text class="item-title" x="1320" y="261">/mission_manager/status</text>
  <rect class="chip" x="1302" y="290" width="386" height="54"/>
  <text class="item-title" x="1320" y="313">Pick target topics</text>
  <text class="item-sub" x="1320" y="331">/mission_pick/tomato_center, radius</text>
  <rect class="chip" x="1302" y="356" width="386" height="44"/>
  <text class="item-title" x="1320" y="383">/tomato_harvest/target_selection</text>
  <rect class="chip" x="1302" y="412" width="386" height="44"/>
  <text class="item-title" x="1320" y="439">tomato_collision_scene_manager</text>
  <rect class="chip" x="1302" y="468" width="386" height="54"/>
  <text class="item-title" x="1320" y="491">/planning_scene</text>
  <text class="item-sub" x="1320" y="509">collision objects + RViz markers</text>
  <rect class="chip" x="1302" y="534" width="386" height="44"/>
  <text class="item-title" x="1320" y="561">MoveIt move_group</text>
  <rect class="chip" x="1302" y="590" width="386" height="44"/>
  <text class="item-title" x="1320" y="617">greenhouse_nearest_pick_place</text>
  <rect class="chip" x="1302" y="646" width="386" height="44"/>
  <text class="item-title" x="1320" y="673">/tomato_harvest/picked</text>

  <!-- Main data-flow edges -->
  <path class="edge" d="M350,270 C388,270 410,270 450,270" stroke="#2563EB" marker-end="url(#arrow-blue)"/>
  <rect class="label-bg" x="365" y="240" width="70" height="24"/>
  <text class="edge-label" x="400" y="257" text-anchor="middle">bridge</text>

  <path class="edge" d="M750,240 C792,230 805,220 840,220" stroke="#0F766E" marker-end="url(#arrow-teal)"/>
  <rect class="label-bg" x="755" y="192" width="70" height="24"/>
  <text class="edge-label" x="790" y="209" text-anchor="middle">scan + TF</text>

  <path class="edge" d="M604,420 L604,742 C604,764 640,766 682,766 L840,766" stroke="#BE185D" marker-end="url(#arrow-rose)"/>
  <rect class="label-bg" x="620" y="710" width="150" height="24"/>
  <text class="edge-label" x="695" y="727" text-anchor="middle">RGB-D + CameraInfo</text>

  <path class="edge" d="M1170,248 C1218,248 1236,248 1280,248" stroke="#B45309" marker-end="url(#arrow-amber)"/>
  <rect class="label-bg" x="1192" y="216" width="74" height="24"/>
  <text class="edge-label" x="1229" y="233" text-anchor="middle">mission</text>

  <path class="edge" d="M1170,782 C1214,770 1236,735 1280,690" stroke="#6D28D9" marker-end="url(#arrow-violet)"/>
  <rect class="label-bg" x="1190" y="742" width="82" height="24"/>
  <text class="edge-label" x="1231" y="759" text-anchor="middle">targets</text>

  <path class="edge-thin" d="M1004,580 L1004,468 C1004,450 1015,445 1035,440" stroke="#6D28D9" stroke-dasharray="8 7" marker-end="url(#arrow-violet)"/>
  <rect class="label-bg" x="890" y="494" width="158" height="24"/>
  <text class="edge-label" x="969" y="511" text-anchor="middle">/tomato_map/list</text>

  <path class="edge-thin" d="M1280,720 C1218,735 1210,835 1170,850" stroke="#BE185D" stroke-dasharray="8 7" marker-end="url(#arrow-rose)"/>
  <rect class="label-bg" x="1195" y="827" width="92" height="24"/>
  <text class="edge-label" x="1241" y="844" text-anchor="middle">picked event</text>

  <path class="edge" d="M1280,838 C1130,972 690,982 365,982 C220,982 210,900 210,420" stroke="#475569" marker-end="url(#arrow-slate)"/>
  <rect class="label-bg" x="570" y="948" width="320" height="24"/>
  <text class="edge-label" x="730" y="965" text-anchor="middle">controller commands + attach / detach</text>

  <!-- Legend -->
  <rect x="70" y="930" width="420" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text class="legend-title" x="92" y="956">FLOW TYPES</text>
  <line x1="92" y1="979" x2="138" y2="979" stroke="#2563EB" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <text class="legend-text" x="150" y="984">sensor/state bridge</text>
  <line x1="292" y1="979" x2="338" y2="979" stroke="#6D28D9" stroke-width="2.0" stroke-dasharray="8 7" marker-end="url(#arrow-violet)"/>
  <text class="legend-text" x="350" y="984">feedback/update</text>

  <text class="small-note" x="1710" y="1000" text-anchor="end">Simplified from the runtime graph; auxiliary diagnostics and parameter topics are omitted for readability.</text>
  </g>
</svg>
