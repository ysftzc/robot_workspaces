/**:
  controller_manager:
    ros__parameters:
      update_rate: 100

      # ── Panther base controllers ──────────────────────────────────────────────
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      drive_controller:
        type: diff_drive_controller/DiffDriveController
      imu_broadcaster:
        type: imu_sensor_broadcaster/IMUSensorBroadcaster

      # ── Franka FR3 arm controllers ────────────────────────────────────────────
      fr3_arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController
      fr3_gripper_controller:
        type: joint_trajectory_controller/JointTrajectoryController

  # ── Panther IMU broadcaster ───────────────────────────────────────────────────
  imu_broadcaster:
    ros__parameters:
      sensor_name: /imu
      frame_id: imu_link
      static_covariance_orientation: [1.8e-3, 0.0, 0.0, 0.0, 1.8e-3, 0.0, 0.0, 0.0, 1.8e-3]
      static_covariance_angular_velocity: [1.0e-4, 0.0, 0.0, 0.0, 1.0e-4, 0.0, 0.0, 0.0, 1.0e-4]
      static_covariance_linear_acceleration: [7.6e-4, 0.0, 0.0, 0.0, 7.6e-4, 0.0, 0.0, 0.0, 7.6e-4]

  # ── Panther drive controller ──────────────────────────────────────────────────
  drive_controller:
    ros__parameters:
      left_wheel_names: [fl_wheel_joint, rl_wheel_joint]
      right_wheel_names: [fr_wheel_joint, rr_wheel_joint]
      wheel_separation: 0.697
      wheel_radius: 0.1825
      wheel_separation_multiplier: 1.0
      left_wheel_radius_multiplier: 1.0
      right_wheel_radius_multiplier: 1.0
      publish_rate: 100.0
      odom_frame_id: odom
      base_frame_id: base_link
      twist_covariance_diagonal: [5.4e-5, 5.4e-5, 0.0, 0.0, 0.0, 1.9e-4]
      open_loop: false
      position_feedback: false
      velocity_rolling_window_size: 1
      # EKF publishes odom->base_link with IMU-corrected rotation.
      enable_odom_tf: false
      cmd_vel_timeout: 2.0
      use_stamped_vel: true
      publish_limited_velocity: false
      linear:
        x:
          max_velocity: 2.0
          min_velocity: -2.0
          max_acceleration: 2.7
          max_deceleration: -2.7
          max_acceleration_reverse: -2.7
          max_deceleration_reverse: 2.7
          max_jerk: .NAN
          min_jerk: .NAN
      angular:
        z:
          max_velocity: 4.0
          min_velocity: -4.0
          max_acceleration: 5.74
          max_deceleration: -5.74
          max_acceleration_reverse: -5.74
          max_deceleration_reverse: 5.74
          max_jerk: .NAN
          min_jerk: .NAN

  # ── Franka FR3 arm controller ─────────────────────────────────────────────────
  fr3_arm_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      state_publish_rate: 50.0
      action_monitor_rate: 20.0
      allow_partial_joints_goal: false
      interpolate_from_desired_state: true   # replaces deprecated open_loop_control
      constraints:
        stopped_velocity_tolerance: 0.01
        goal_time: 0.0

  # ── Franka gripper controller ─────────────────────────────────────────────────
  fr3_gripper_controller:
    ros__parameters:
      joints:
        - fr3_finger_joint1
        - fr3_finger_joint2
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      state_publish_rate: 50.0
      action_monitor_rate: 20.0
      allow_partial_joints_goal: false
      interpolate_from_desired_state: true
